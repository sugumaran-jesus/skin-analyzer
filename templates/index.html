<h2>Upload Skin Image</h2>



<style>
body {
    text-align: center;
    font-family: Arial;
    background-color: #f5f5f5;
}

h1 {
    color: #333;
}

form {
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
}
</style>


<img id="preview" width="200"/>

<script>
function previewImage(event) {
    var reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

<!DOCTYPE html>
<html>
<head>
    <title>Skin Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: #333;
        }

        input {
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Skin Analyzer 🔍</h1>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="image" onchange="previewImage(event)">
            <br>
            <button type="submit">Analyze</button>
        </form>

        <img id="preview" width="200"/>

{% if result %}
    <div class="result-box">
        <h2>{{ result }}</h2>
        <p class="suggestion-box">{{ suggestion }}</p>
    </div>
{% endif %}
<style>
.result-box {
    margin-top: 20px;
    padding: 20px;
    background: #e3f2fd;
    border-radius: 10px;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 10px gray;
}

.result-box h2 {
    font-size: 28px;
    color: #0d47a1;
}

.result-box p {
    font-size: 18px;
    color: #333;
}
.suggestion-box {
    margin-top: 15px;
    padding: 15px;
    background: linear-gradient(to right, #ffe0c3, #ffb6b9);
    border-left: 6px solid #ff6f61;
    border-radius: 8px;
    font-size: 18px;
    font-weight: 500;
    color: #333;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 8px rgba(0,0,0,0.2);
}
</style>

    <script>
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function(){
                document.getElementById('preview').src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
